<svg viewBox="0 0 680 780" width="100%" role="img">
  <title>CrewAI Fund Trade Agent v2 Architecture</title>
  <desc>11 Agents across 5 Layers: Screening → Veto → Analysis → Debate → Decision</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .th { font: 500 14px sans-serif; fill: #1a1a1a; }
      .ts { font: 400 12px sans-serif; fill: #666; }
      .tc { font: 400 11px sans-serif; fill: #999; }
      .layer-label { font: 500 13px sans-serif; }
    </style>
  </defs>

  <rect x="40" y="20" width="600" height="110" rx="16" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text class="layer-label" x="56" y="42" fill="#185FA5">Layer 1 — Data Screening</text>
  <g>
    <rect x="80" y="54" width="220" height="56" rx="8" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5"/>
    <text class="th" x="190" y="74" text-anchor="middle" dominant-baseline="central">基金数据筛选师</text>
    <text class="ts" x="190" y="94" text-anchor="middle" dominant-baseline="central">screen_funds → top 20</text>
  </g>
  <g>
    <rect x="380" y="54" width="220" height="56" rx="8" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5"/>
    <text class="th" x="490" y="74" text-anchor="middle" dominant-baseline="central">宏观经济分析师</text>
    <text class="ts" x="490" y="94" text-anchor="middle" dominant-baseline="central">GDP / CPI / 利率 / 政策</text>
  </g>

  <line x1="190" y1="130" x2="190" y2="155" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="40" y="150" width="600" height="110" rx="16" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
  <text class="layer-label" x="56" y="172" fill="#A32D2D">Layer 1.5 — Hard Constraint Veto (新增)</text>
  <g>
    <rect x="130" y="184" width="420" height="56" rx="8" fill="#F7C1C1" stroke="#E24B4A" stroke-width="0.5"/>
    <text class="th" x="340" y="204" text-anchor="middle" dominant-baseline="central">硬约束否决官</text>
    <text class="ts" x="340" y="224" text-anchor="middle" dominant-baseline="central">RSI&gt;70 / MA空头 / 波动率&gt;35% → 一票否决</text>
  </g>

  <line x1="340" y1="260" x2="340" y2="285" stroke="#E24B4A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="40" y="280" width="600" height="110" rx="16" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text class="layer-label" x="56" y="302" fill="#0F6E56">Layer 2 — Multi-dimensional Analysis</text>
  <g>
    <rect x="60" y="314" width="170" height="56" rx="8" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
    <text class="th" x="145" y="334" text-anchor="middle" dominant-baseline="central">技术分析专家</text>
    <text class="ts" x="145" y="354" text-anchor="middle" dominant-baseline="central">MA / RSI / MACD</text>
  </g>
  <g>
    <rect x="255" y="314" width="170" height="56" rx="8" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
    <text class="th" x="340" y="334" text-anchor="middle" dominant-baseline="central">基本面分析专家</text>
    <text class="ts" x="340" y="354" text-anchor="middle" dominant-baseline="central">经理 / 持仓 / 规模</text>
  </g>
  <g>
    <rect x="450" y="314" width="170" height="56" rx="8" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
    <text class="th" x="535" y="334" text-anchor="middle" dominant-baseline="central">市场情绪分析师</text>
    <text class="ts" x="535" y="354" text-anchor="middle" dominant-baseline="central">成交 / 换手 / 舆情</text>
  </g>

  <line x1="145" y1="390" x2="170" y2="415" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="340" y1="390" x2="260" y2="415" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="535" y1="390" x2="430" y2="415" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="145" y1="390" x2="170" y2="445" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <line x1="535" y1="390" x2="430" y2="445" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="4,3"/>

  <rect x="40" y="410" width="600" height="170" rx="16" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text class="layer-label" x="56" y="432" fill="#534AB7">Layer 3 — Parallel Debate + Judge (改进)</text>
  <g>
    <rect x="80" y="444" width="200" height="56" rx="8" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5"/>
    <text class="th" x="180" y="464" text-anchor="middle" dominant-baseline="central">多头研究员</text>
    <text class="ts" x="180" y="484" text-anchor="middle" dominant-baseline="central">独立构建买入论据 ∥</text>
  </g>
  <g>
    <rect x="400" y="444" width="200" height="56" rx="8" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5"/>
    <text class="th" x="500" y="464" text-anchor="middle" dominant-baseline="central">空头研究员</text>
    <text class="ts" x="500" y="484" text-anchor="middle" dominant-baseline="central">独立构建风险论据 ∥</text>
  </g>
  <text class="tc" x="340" y="472" text-anchor="middle" dominant-baseline="central" font-size="20">∥</text>
  <g>
    <rect x="160" y="516" width="360" height="44" rx="8" fill="#AFA9EC" stroke="#7F77DD" stroke-width="0.5"/>
    <text class="th" x="340" y="538" text-anchor="middle" dominant-baseline="central">辩论裁决官 (新增) + 量化评分卡</text>
  </g>
  <line x1="180" y1="500" x2="240" y2="516" stroke="#7F77DD" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="500" y1="500" x2="440" y2="516" stroke="#7F77DD" stroke-width="1" marker-end="url(#arrow)"/>

  <line x1="340" y1="580" x2="340" y2="605" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="40" y="600" width="600" height="110" rx="16" fill="#FAECDA" stroke="#BA7517" stroke-width="0.5"/>
  <text class="layer-label" x="56" y="622" fill="#854F0B">Layer 4 — Decision &amp; Risk Control</text>
  <g>
    <rect x="80" y="634" width="220" height="56" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
    <text class="th" x="190" y="654" text-anchor="middle" dominant-baseline="central">风控专家</text>
    <text class="ts" x="190" y="674" text-anchor="middle" dominant-baseline="central">止损 / 仓位 / 波动率</text>
  </g>
  <g>
    <rect x="380" y="634" width="220" height="56" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
    <text class="th" x="490" y="654" text-anchor="middle" dominant-baseline="central">投资组合经理</text>
    <text class="ts" x="490" y="674" text-anchor="middle" dominant-baseline="central">经验注入 + 最终方案</text>
  </g>
  <line x1="300" y1="662" x2="380" y2="662" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="40" y="730" width="600" height="40" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text class="ts" x="340" y="754" text-anchor="middle" dominant-baseline="central">反馈环: 推荐记录 → 结果追踪 → 复盘引擎 → 经验注入 prompt (feedback.py)</text>

  <path d="M600 662 L640 662 L640 74 L620 74" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text class="tc" x="652" y="370" text-anchor="start" dominant-baseline="central" transform="rotate(90, 652, 370)">经验注入 (下一轮)</text>
</svg>